function qsBadge(rank){
  if(!rank)return null;
  if(rank<=10)return{bg:"linear-gradient(135deg,#FEF9C3,#FDE68A)",color:"#92400E",border:"#FCD34D"};
  if(rank<=25)return{bg:"linear-gradient(135deg,#DBEAFE,#BFDBFE)",color:"#1E40AF",border:"#93C5FD"};
  if(rank<=50)return{bg:"linear-gradient(135deg,#EEF2FF,#E0E7FF)",color:"#4338CA",border:"#A5B4FC"};
  if(rank<=100)return{bg:"linear-gradient(135deg,#F3E8FF,#E9D5FF)",color:"#6D28D9",border:"#C4B5FD"};
  return{bg:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.65)",border:"#CBD5E1"};
}

      m[d.uni].alumni.push(d);
    });
    const entries=Object.entries(m);

    return entries.sort((a,b)=>b[1].count-a[1].count);

                    <div>
                      <div style={{fontSize:17,fontWeight:700,color:"#ffffff"}}>{school}</div>
                      <div style={{fontSize:12,color:"rgba(255,255,255,0.42)",marginTop:3}}>{st.count} alumni · {st.unis.size} universities · {st.countries.size} countries</div>
                    </div>
                    <div style={{width:44,height:44,borderRadius:"50%",background:`${sc}18`,border:`2px solid ${sc}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:800,color:sc}}>{st.count}</div>
                  </div>

                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.42)",letterSpacing:"0.06em",marginBottom:8}}>TOP UNIVERSITIES</div>
                    {topUniList.map(([uni,cnt],j)=>{
                      const uniInfo=byUni.find(([u])=>u===uni);
                      const rank=uniInfo?uniInfo[1].rank:null;
                      const badge=qsBadge(rank);
                      return (
                        <div key={uni} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,padding:"4px 0",borderBottom:j<topUniList.length-1?"1px dashed rgba(255,255,255,0.1)":"none"}}>
                          <div style={{width:16,fontSize:11,color:"rgba(255,255,255,0.42)",fontWeight:700}}>{j+1}</div>
                          <div style={{flex:1,fontSize:12,color:"rgba(255,255,255,0.87)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{uni}</div>
                          {badge&&<span style={{padding:"1px 7px",borderRadius:6,background:badge.bg,color:badge.color,fontSize:10,fontWeight:700,flexShrink:0}}>#{rank}</span>}
                          <div style={{fontSize:12,fontWeight:700,color:sc,flexShrink:0}}>×{cnt}</div>
                        </div>
                      );
                    })}
                  </div>

                  <div style={{paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                      {[...st.countries].map(c=>(
                        <span key={c} title={c} style={{fontSize:16}}>{CF[c]||"🌐"}</span>
                      ))}
                    </div>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.42)"}}>{st.countries.size} countries</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ALUMNI DIRECTORY */}
        {tab==="alumni"&&(
          <div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
              <input
                value={search}
                onChange={e=>setSearch(e.target.value)}
                placeholder="🔍  Search name, university, or faculty..."
                style={{flex:"1 1 220px",padding:"9px 14px",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.07)",fontSize:13,outline:"none",color:"rgba(255,255,255,0.87)",transition:"border 0.2s,box-shadow 0.2s"}}
              />
              <select value={schoolFilter} onChange={e=>setSchoolFilter(e.target.value)} style={{padding:"9px 12px",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.07)",fontSize:12,cursor:"pointer",color:"rgba(255,255,255,0.65)",outline:"none"}}>
                <option value="All">All Schools</option>
                {uniqueSchools.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              <select value={countryFilter} onChange={e=>setCountryFilter(e.target.value)} style={{padding:"9px 12px",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.07)",fontSize:12,cursor:"pointer",color:"rgba(255,255,255,0.65)",outline:"none"}}>
                <option value="All">All Countries</option>
                {byCountry.map(([c])=><option key={c} value={c}>{CF[c]||""} {c}</option>)}
              </select>
              <select value={yearFilter} onChange={e=>setYearFilter(e.target.value)} style={{padding:"9px 12px",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.07)",fontSize:12,cursor:"pointer",color:"rgba(255,255,255,0.65)",outline:"none"}}>
                <option value="All">All Years</option>
                {uniqueYears.map(y=><option key={y} value={y}>{y}</option>)}
              </select>
              {(search||schoolFilter!=="All"||countryFilter!=="All"||yearFilter!=="All")&&(
                <button onClick={()=>{setSearch("");setSchoolFilter("All");setCountryFilter("All");setYearFilter("All");}} style={{padding:"9px 14px",borderRadius:10,border:"1.5px solid #FCA5A5",background:"rgba(254,242,242,0.9)",fontSize:12,cursor:"pointer",color:"#DC2626",fontWeight:600}}>✕ Clear</button>
              )}
            </div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.42)",marginBottom:12,fontWeight:500}}>{filteredAlumni.length} of {data.length} alumni</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {filteredAlumni.map((d,i)=>{
                const sc=SC[d.school]||"#6366F1";
                const badge=qsBadge(d.rank);
                return (
                  <div key={i} className="alumni-row" style={{...card,padding:"11px 16px",borderLeft:`3px solid ${sc}`,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                    <div style={{flex:"1 1 160px",minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,color:"#ffffff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.name}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.42)",marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.faculty||"—"}</div>
                    </div>
                    <div style={{flex:"1 1 160px",minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,color:"rgba(255,255,255,0.87)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.uni}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.42)",marginTop:1}}>{CF[d.country]||"🌐"} {d.country}</div>
                    </div>
                    <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
                      <span style={{padding:"2px 9px",borderRadius:10,background:`${sc}15`,color:sc,fontSize:11,fontWeight:600,border:`1px solid ${sc}25`}}>{d.school}</span>
                      {badge&&<span style={{padding:"2px 8px",borderRadius:8,background:badge.bg,color:badge.color,border:`1px solid ${badge.border}`,fontSize:11,fontWeight:700}}>#{d.rank}</span>}
                      <span style={{padding:"2px 8px",borderRadius:10,background:"linear-gradient(135deg,#DBEAFE,#C7D9FA)",color:"#2563EB",fontSize:11,fontWeight:600}}>{d.year}</span>
                    </div>
                  </div>
                );
              })}
              {filteredAlumni.length===0&&(
                <div style={{textAlign:"center",padding:"48px 0",color:"rgba(255,255,255,0.42)",fontSize:14}}>No alumni match your filters.</div>
              )}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
