function Dashboard() {
  const [level, setLevel] = useState("All");
  const [tab, setTab] = useState("overview");
  const [timnasYear, setTimnasYear] = useState(2025);

  const data = useMemo(() => RAW.map(r => ({
    level:r[0], year:r[1], comp:r[2],
    inst: NM[r[3]]||r[3],
    field: NF[r[4]]||r[4],
    name:r[5], award:r[6]
  })), []);

  const filtered = useMemo(() => data.filter(d => level==="All"||d.level===level), [data,level]);

  const totals = useMemo(()=>{
    const t={Gold:0,Silver:0,Bronze:0,HM:0};
    filtered.forEach(d=>{ if(t[d.award]!==undefined) t[d.award]++; });
    return t;
  },[filtered]);

  const bySchool = useMemo(()=>{
    const m={};
    filtered.forEach(d=>{
      if(!m[d.inst]) m[d.inst]={Gold:0,Silver:0,Bronze:0,HM:0,total:0,score:0};
      m[d.inst][d.award]=(m[d.inst][d.award]||0)+1;
      m[d.inst].total++; m[d.inst].score+=MW[d.award]||0;
    });
    return Object.entries(m).sort((a,b)=>b[1].score-a[1].score);
  },[filtered]);

  const byYear = useMemo(()=>{
    const m={};
    filtered.forEach(d=>{
      if(!m[d.year]) m[d.year]={Gold:0,Silver:0,Bronze:0,HM:0};
      m[d.year][d.award]=(m[d.year][d.award]||0)+1;
    });
    return Object.entries(m).sort((a,b)=>a[0]-b[0]);
  },[filtered]);

  const byField = useMemo(()=>{
    const m={};
    filtered.forEach(d=>{ m[d.field]=(m[d.field]||0)+1; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[filtered]);

  const champions = useMemo(()=>{
    const m={};
    filtered.forEach(d=>{
      if(!m[d.name]) m[d.name]={medals:[],insts:new Set()};
      m[d.name].medals.push(d); m[d.name].insts.add(d.inst);
    });
    return Object.entries(m).filter(([,v])=>v.medals.length>=2)
      .sort((a,b)=>{
        const sa=a[1].medals.reduce((s,x)=>s+(MW[x.award]||0),0);
        const sb=b[1].medals.reduce((s,x)=>s+(MW[x.award]||0),0);
        return sb-sa;
      });
  },[filtered]);

  const maxBar=bySchool.length>0?bySchool[0][1].score:1;
  const maxY=byYear.length>0?Math.max(...byYear.map(([,v])=>v.Gold+v.Silver+v.Bronze+v.HM)):1;
  const card={background:"rgba(255,255,255,0.07)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.11)",borderRadius:12,padding:20,boxShadow:"0 20px 50px rgba(0,0,0,0.4)"};
  const pill=(active,onClick,label)=>(
    <button onClick={onClick} className="pill-btn" style={{padding:"7px 18px",borderRadius:24,border:`1.5px solid ${active?"#14b8a6":"rgba(255,255,255,0.15)"}`,background:active?"#14b8a6":"rgba(255,255,255,0.06)",color:active?"white":"rgba(255,255,255,0.65)",cursor:"pointer",fontSize:13,fontWeight:active?"600":"400",transition:"all 0.15s"}}>{label}</button>
  );

  return (
    <div style={{fontFamily:"DM Sans,system-ui,sans-serif",background:"transparent",minHeight:"100vh",color:"rgba(255,255,255,0.87)"}}>
      <div style={{background:"rgba(255,255,255,0.04)",backdropFilter:"blur(24px)",borderBottom:"1px solid rgba(255,255,255,0.09)",padding:"24px 36px 0"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:20}}>
          <div>
            <div style={{fontSize:11,letterSpacing:"0.2em",color:"#14b8a6",textTransform:"uppercase",fontWeight:600,marginBottom:6}}>Eduversal Partner Schools</div>
            <h1 style={{fontSize:"clamp(1.6rem,3vw,2.2rem)",fontWeight:700,color:"#ffffff",margin:0,fontFamily:"Playfair Display,serif"}}>🏆 Academic Olympiad Excellence</h1>
            <p style={{color:"rgba(255,255,255,0.42)",fontSize:13,margin:"5px 0 0"}}>525 medals · National & International · 2013–2025</p>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {["All","International","National"].map(l=>pill(level===l,()=>setLevel(l),l==="All"?"🌐 All":l==="International"?"🌍 International":"🇮🇩 National"))}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:0}}>
          {[
            {label:"Total",value:filtered.length,color:"#1D4ED8",bg:"linear-gradient(135deg,#DBEAFE,#EEF2FF)",icon:"🎖️"},
            {label:"Gold",value:totals.Gold,color:"#92400E",bg:"linear-gradient(135deg,#FEF9C3,#FEF3C7)",icon:"🥇"},
            {label:"Silver",value:totals.Silver,color:"#1E293B",bg:"linear-gradient(135deg,#E2E8F0,#F1F5F9)",icon:"🥈"},
            {label:"Bronze + HM",value:totals.Bronze+totals.HM,color:"#7C2D12",bg:"linear-gradient(135deg,#FDE68A,#FEF3C7)",icon:"🥉"},
          ].map(k=>(
            <div key={k.label} className="stat-tile" style={{background:k.bg,borderTop:`3px solid ${k.color}`,borderRadius:"0 0 8px 8px",padding:"14px 16px",textAlign:"center"}}>
              <div style={{fontSize:22}}>{k.icon}</div>
              <div style={{fontSize:26,fontWeight:800,color:k.color}}>{k.value}</div>
              <div style={{fontSize:11,color:"rgba(0,0,0,0.72)",fontWeight:600,marginTop:2}}>{k.label}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:0,marginTop:16}}>
          {[["overview","📊 Overview"],["schools","🏫 Schools"],["timeline","📅 Timeline"],["champions","⭐ Champions"],["timnas","🇮🇩 Timnas"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} className="tab-btn" style={{padding:"10px 20px",border:"none",borderBottom:`2.5px solid ${tab===id?"#14b8a6":"transparent"}`,background:"transparent",color:tab===id?"#14b8a6":"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:13,fontWeight:tab===id?600:400,transition:"all 0.15s"}}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"24px 36px",background:"transparent"}}>
        {tab==="overview" && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div style={card}>
              <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.42)",letterSpacing:"0.08em",marginBottom:16}}>MEDAL DISTRIBUTION</div>
              {["Gold","Silver","Bronze","HM"].map(m=>(
                <div key={m} className="medal-row" style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:13,fontWeight:500,color:"rgba(255,255,255,0.87)"}}>{ME[m]} {m==="HM"?"Honorable Mention":m}</span>
                    <span style={{fontWeight:700,color:MC[m]}}>{totals[m]}</span>
                  </div>
                  <div style={{height:7,background:"rgba(255,255,255,0.09)",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${(totals[m]/(filtered.length||1))*100}%`,background:MC[m],borderRadius:4}}/>
                  </div>
                </div>
              ))}
              <div style={{marginTop:16,paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.08)",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div style={{background:"linear-gradient(135deg,#FEF9C3,#FDE68A)",borderRadius:8,padding:"10px 14px",textAlign:"center",boxShadow:"0 2px 8px rgba(180,83,9,0.10)"}}>
                  <div style={{fontSize:18,fontWeight:700,color:"#B45309"}}>{bySchool.length}</div>
                  <div style={{fontSize:11,color:"#92400E"}}>Active Schools</div>
                </div>
                <div style={{background:"linear-gradient(135deg,#DBEAFE,#C7D9FA)",borderRadius:8,padding:"10px 14px",textAlign:"center",boxShadow:"0 2px 8px rgba(29,78,216,0.10)"}}>
                  <div style={{fontSize:18,fontWeight:700,color:"#1D4ED8"}}>{[...new Set(filtered.map(d=>d.year))].length}</div>
                  <div style={{fontSize:11,color:"#1E40AF"}}>Years of Data</div>
                </div>
              </div>
            </div>
            <div style={card}>
              <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.42)",letterSpacing:"0.08em",marginBottom:16}}>TOP SUBJECTS</div>
              {byField.slice(0,9).map(([f,cnt],i)=>(
                <div key={f} className="field-row" style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <div style={{width:18,fontSize:11,color:"rgba(255,255,255,0.42)",textAlign:"right",flexShrink:0}}>{i+1}</div>
                  <div style={{flex:1,fontSize:13,color:"rgba(255,255,255,0.87)"}}>{f}</div>
                  <div style={{width:100,height:6,background:"rgba(255,255,255,0.09)",borderRadius:3}}>
                    <div style={{height:"100%",width:`${(cnt/byField[0][1])*100}%`,background:`hsl(${220-i*18},70%,55%)`,borderRadius:3}}/>
                  </div>
                  <div style={{width:28,textAlign:"right",fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.65)"}}>{cnt}</div>
                </div>
              ))}
            </div>
            <div style={{...card,gridColumn:"1 / -1"}}>
              <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.42)",letterSpacing:"0.08em",marginBottom:16}}>MEDALS BY YEAR</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:5,height:340}}>
                {byYear.map(([year,v])=>{
                  const total=v.Gold+v.Silver+v.Bronze+v.HM;
                  const h=(total/maxY)*310;
                  return (
                    <div key={year} className="yr-bar-item" title={`${year}: ${total} medals`} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                      <div className="yr-total" style={{fontSize:10,color:"rgba(255,255,255,0.42)",fontWeight:600}}>{total}</div>
                      <div style={{width:"100%",height:h,display:"flex",flexDirection:"column",justifyContent:"flex-end",borderRadius:"4px 4px 0 0",overflow:"hidden"}}>
                        {[["HM",v.HM],["Bronze",v.Bronze],["Silver",v.Silver],["Gold",v.Gold]].map(([m,cnt])=>cnt>0&&(
                          <div key={m} style={{width:"100%",flex:cnt,background:MC[m],minHeight:2}}/>
                        ))}
                      </div>
                      <div style={{fontSize:9,color:"rgba(255,255,255,0.42)",transform:"rotate(-45deg)",transformOrigin:"top center",marginTop:4,whiteSpace:"nowrap"}}>{year}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:16,marginTop:16,justifyContent:"center"}}>
                {["Gold","Silver","Bronze","HM"].map(m=>(
                  <div key={m} style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:10,height:10,borderRadius:2,background:MC[m]}}/>
                    <span style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>{m}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab==="schools" && (
          <div>
            <p style={{fontSize:13,color:"rgba(255,255,255,0.42)",marginBottom:16}}>Ranked by weighted score (Gold×4, Silver×3, Bronze×2, HM×1)</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {bySchool.map(([school,st],i)=>{
                const color=SC[school]||"rgba(255,255,255,0.65)";
                const badge=i===0?"#F59E0B":i===1?"rgba(255,255,255,0.42)":i===2?"#B45309":null;
                return (
                  <div key={school} className="school-card" style={{...card,padding:"14px 18px",borderLeft:`4px solid ${color}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                      <div style={{width:30,height:30,borderRadius:"50%",background:badge||"rgba(255,255,255,0.09)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:badge?"white":"rgba(255,255,255,0.65)",flexShrink:0}}>{i+1}</div>
                      <div style={{flex:1,minWidth:120}}>
                        <div style={{fontWeight:600,fontSize:15,color:"#ffffff"}}>{school}</div>
                        <div style={{fontSize:12,color:"rgba(255,255,255,0.42)",marginTop:1}}>{st.total} medals · Score: <b style={{color}}>{st.score}</b></div>
                      </div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {["Gold","Silver","Bronze","HM"].map(m=>st[m]>0&&(
                          <span key={m} className="medal-tag" style={{padding:"3px 9px",borderRadius:20,background:`${MC[m]}18`,color:MC[m],fontSize:12,fontWeight:600,border:`1px solid ${MC[m]}35`}}>{ME[m]} {st[m]}</span>
                        ))}
                      </div>
                      <div style={{width:120}}>
                        <div style={{height:6,background:"rgba(255,255,255,0.09)",borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${(st.score/maxBar)*100}%`,background:color,borderRadius:3}}/>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="timeline" && (
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[...filtered].sort((a,b)=>b.year-a.year).slice(0,60).map((d,i)=>(
              <div key={i} className="timeline-card" style={{...card,padding:"10px 14px",borderLeft:`3px solid ${MC[d.award]}`,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                <div style={{fontSize:20,width:28,textAlign:"center"}}>{ME[d.award]}</div>
                <div style={{flex:1,minWidth:120}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#ffffff"}}>{d.name}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.42)"}}>{d.inst}</div>
                </div>
                <div style={{fontSize:12,color:"rgba(255,255,255,0.65)",textAlign:"center"}}>
                  <div style={{fontWeight:500}}>{d.comp}</div>
                  <div style={{color:"rgba(255,255,255,0.42)"}}>{d.field}</div>
                </div>
                <span style={{padding:"3px 10px",borderRadius:20,background:"linear-gradient(135deg,#DBEAFE,#C7D9FA)",fontSize:11,color:"#2563EB",fontWeight:600}}>{d.year}</span>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.42)"}}>{d.level==="International"?"🌍":"🇮🇩"}</span>
              </div>
            ))}
            {filtered.length>60&&<div style={{textAlign:"center",color:"rgba(255,255,255,0.42)",fontSize:12,padding:8}}>Showing 60 of {filtered.length} records</div>}
          </div>
        )}

        {tab==="timnas" && (()=>{
          const tFiltered=TIMNAS.filter(r=>r[4]===timnasYear);
          const tBySubject={};
          tFiltered.forEach(r=>{if(!tBySubject[r[0]])tBySubject[r[0]]=[];tBySubject[r[0]].push(r);});
          const tMedals=tFiltered.reduce((a,r)=>{const k=r[3];if(k==="Gold"||k==="Silver"||k==="Bronze"||k==="HM")a[k]=(a[k]||0)+1;return a;},{Gold:0,Silver:0,Bronze:0,HM:0});
          const tPartner=tFiltered.filter(r=>TPMAP[r[2]]);
          return (
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:20}}>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.42)",letterSpacing:"0.08em",marginBottom:4}}>INDONESIAN NATIONAL TEAM (TIMNAS)</div>
                  <div style={{fontSize:13,color:"rgba(255,255,255,0.5)"}}>{tFiltered.length} delegates · {tPartner.length > 0 ? <><b style={{color:"#1D4ED8"}}>{tPartner.length}</b> from Eduversal partner schools</> : "No Eduversal partner school delegates"}</div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  {[2023,2024,2025].map(y=>(
                    <button key={y} className="pill-btn" onClick={()=>setTimnasYear(y)} style={{padding:"7px 16px",borderRadius:24,border:`1.5px solid ${timnasYear===y?"#14b8a6":"rgba(255,255,255,0.15)"}`,background:timnasYear===y?"rgba(20,184,166,0.9)":"rgba(255,255,255,0.06)",color:timnasYear===y?"white":"rgba(255,255,255,0.65)",cursor:"pointer",fontSize:13,fontWeight:timnasYear===y?"600":"400"}}>{y}</button>
                  ))}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
                {[{k:"Gold",icon:"🥇",label:"Gold"},{k:"Silver",icon:"🥈",label:"Silver"},{k:"Bronze",icon:"🥉",label:"Bronze"},{k:"HM",icon:"🏅",label:"HM"}].map(({k,icon,label})=>(
                  <div key={k} style={{background:TMED_BG[k],borderTop:`3px solid ${TMED_C[k]}`,borderRadius:"0 0 8px 8px",padding:"12px 14px",textAlign:"center"}}>
                    <div style={{fontSize:20}}>{icon}</div>
                    <div style={{fontSize:22,fontWeight:700,color:TMED_C[k]}}>{tMedals[k]||0}</div>
                    <div style={{fontSize:11,color:"rgba(0,0,0,0.55)",fontWeight:500}}>{label}</div>
                  </div>
                ))}
              </div>
              {tPartner.length>0&&(
                <div style={{background:"linear-gradient(135deg,rgba(238,242,255,0.9),rgba(224,231,252,0.9))",backdropFilter:"blur(8px)",border:"1px solid rgba(196,212,240,0.8)",borderRadius:12,padding:"14px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                  <span style={{fontSize:16}}>🏫</span>
                  <div style={{fontSize:13,color:"rgba(255,255,255,0.87)",fontWeight:500,flex:1}}>
                    <b style={{color:"#1D4ED8"}}>Eduversal Partner School Delegates:</b>{" "}
                    {tPartner.map((r,i)=>(
                      <span key={i} style={{display:"inline-flex",alignItems:"center",gap:4,marginRight:10,marginBottom:2}}>
                        <span style={{fontSize:11}}>{TMED_ICON[r[3]]}</span>
                        <b style={{color:"#ffffff"}}>{r[1]}</b>
                        <span style={{padding:"1px 7px",borderRadius:10,background:SC[TPMAP[r[2]]]||"#6366F1",color:"white",fontSize:10,fontWeight:600}}>{TPMAP[r[2]]}</span>
                        <span style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>· {r[0].split(" ")[0]}</span>
                      </span>
                    ))}
                  </div>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14}}>
                {Object.entries(tBySubject).map(([subj,students])=>{
                  const sc=SCOLOR[subj]||"#6366F1";
                  const si=SICON[subj]||"🎓";
                  const hasPartner=students.some(r=>TPMAP[r[2]]);
                  return (
                    <div key={subj} style={{background:"rgba(255,255,255,0.07)",backdropFilter:"blur(12px)",border:`1px solid rgba(255,255,255,0.11)`,borderRadius:12,overflow:"hidden",boxShadow:"0 4px 16px rgba(99,102,241,0.09)"}}>
                      <div style={{background:`linear-gradient(135deg,${sc}18,${sc}08)`,borderBottom:`1px solid ${sc}30`,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:18}}>{si}</span>
                          <div>
                            <div style={{fontSize:13,fontWeight:700,color:"#ffffff"}}>{subj}</div>
                            <div style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>{students.length} delegates</div>
                          </div>
                        </div>
                        {hasPartner&&<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:`${sc}22`,color:sc,fontWeight:700,border:`1px solid ${sc}40`}}>★ Partner</span>}
                      </div>
                      <div style={{padding:"8px 14px 10px"}}>
                        {students.map((r,j)=>{
                          const partnerName=TPMAP[r[2]];
                          const medC=TMED_C[r[3]]||"rgba(255,255,255,0.42)";
                          const medIcon=TMED_ICON[r[3]]||"—";
                          return (
                            <div key={j} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 2px",borderBottom:j<students.length-1?"1px solid rgba(255,255,255,0.08)":"none"}}>
                              <span style={{width:20,textAlign:"center",fontSize:14,flexShrink:0}}>{medIcon}</span>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:12,fontWeight:partnerName?700:500,color:partnerName?"#ffffff":"rgba(255,255,255,0.8)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r[1]}</div>
                                <div style={{fontSize:10,color:"rgba(255,255,255,0.42)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r[2]}</div>
                              </div>
                              <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                                {partnerName&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:8,background:SC[partnerName]||"#6366F1",color:"white",fontWeight:700}}>{partnerName}</span>}
                                <span style={{fontSize:10,fontWeight:600,color:medC,padding:"1px 7px",borderRadius:8,background:`${medC}15`,border:`1px solid ${medC}30`}}>{r[3]}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {tab==="champions" && (
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <p style={{fontSize:13,color:"rgba(255,255,255,0.42)",margin:"0 0 4px"}}>Students with 2+ medals across any competition</p>
            {champions.map(([name,v],i)=>{
              const score=v.medals.reduce((s,m)=>s+(MW[m.award]||0),0);
              const hasGold=v.medals.some(m=>m.award==="Gold");
              return (
                <div key={name} className="champ-card" style={{...card,borderLeft:`4px solid ${hasGold?MC.Gold:"#CBD5E1"}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                    <div style={{fontSize:26}}>{hasGold?"⭐":"🌟"}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15,color:"#ffffff"}}>{name}</div>
                      <div style={{fontSize:12,color:"rgba(255,255,255,0.42)"}}>{[...v.insts].join(" · ")}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:16,fontWeight:700,color:"#818CF8"}}>{v.medals.length} medals</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.42)"}}>Score: {score}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                    {v.medals.map((m,j)=>(
                      <span key={j} className="medal-tag" style={{padding:"3px 9px",borderRadius:20,background:`${MC[m.award]}15`,color:MC[m.award],fontSize:11,border:`1px solid ${MC[m.award]}30`,fontWeight:500}}>
                        {ME[m.award]} {m.year} {m.comp} {m.level==="International"?"🌍":"🇮🇩"}
                      </span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
