["National",2013,"OSN","Sragen BBS","Earth Science","Khoirul Haq Nurul R","Gold"],
["National",2013,"OSN","Sragen BBS","Earth Science","Paschalis Pindyka A K","Bronze"],
["National",2013,"OSN","Kesatuan Bangsa","Chemistry","Ramadani Dwi Kurniawan","Bronze"],
["National",2013,"OSN","Pribadi Bandung","Chemistry","Maulinda Kusumawardani","Silver"],
["National",2013,"OSN","Pribadi Bandung","Chemistry","Alief Moulana","Bronze"],
["National",2013,"OSN","Semesta","Chemistry","Nindya Widita A","Silver"],
["National",2013,"OSN","Sragen BBS","Chemistry","Yoga Rafinika","Bronze"],
["National",2013,"OSN","Sragen BBS","Chemistry","Abu Bakar Abdul Hamid","Bronze"],
["National",2013,"OSN","Fatih","Mathematics","Mufti Al Ummam","Silver"],
["National",2013,"OSN","Kharisma Bangsa","Mathematics","Natasha","Silver"],
["National",2013,"OSN","Pribadi Depok","Mathematics","Rizky Yudha Irawan","Silver"],
["National",2013,"OSN","Sragen BBS","Mathematics","Dhea Arrokhman Y C","Silver"],
["National",2013,"OSN","Kharisma Bangsa","Mathematics","Farras Muhammad Hibban Fadila","Silver"],
["National",2013,"OSN","Semesta","Mathematics","Adiba Nur Ashri Ramadhani","Bronze"],
];

const NM={"Kesatuan bangsa":"Kesatuan Bangsa","Cahaya Rancamaya Islamic Boarding School":"Cahaya Rancamaya","Semesta Bilingual Boarding School":"Semesta","Semesta 3":"Semesta","Semesta CG":"Semesta","Fatih Bilingual School":"Fatih","TNA Fatih Bilingual School":"Fatih","Fatih Putra":"Fatih","Mega Islamic Boarding School":"Mega Islamic","SMAN Banua Kalimantan Selatan":"SMAN Banua","SMAN 1 Sumatera Barat":"SMAN Sumbar"};
const NF={"Astronomi":"Astronomy","Biologi":"Biology","Fisika":"Physics","Matematika SMA":"Mathematics","Matematika SMP":"Mathematics","Ekonomi":"Economy","Kebumian":"Earth Science","Kimia":"Chemistry","Informatika":"Computer Science","IPA":"Science","Social Science":"Social Science"};
const MW={Gold:4,Silver:3,Bronze:2,HM:1};
const MC={Gold:"#D97706",Silver:"#64748B",Bronze:"#92400E",HM:"#7C3AED"};
const ME={Gold:"🥇",Silver:"🥈",Bronze:"🥉",HM:"🏅"};
const SC={"Kesatuan Bangsa":"#1D4ED8","Kharisma Bangsa":"#059669","Semesta":"#7C3AED","Pribadi Bandung":"#D97706","Pribadi Depok":"#EA580C","Cahaya Rancamaya":"#DB2777","Fatih":"#0D9488","Mega Islamic":"#4F46E5","Sragen BBS":"#65A30D","SMAN Banua":"#0891B2","SMAN Sumbar":"#DC2626"};

function Dashboard() {
  const [level, setLevel] = useState("All");
  const [tab, setTab] = useState("overview");

  const data = useMemo(() => RAW.map(r => ({
    level:r[0], year:r[1], comp:r[2],
    inst: NM[r[3]]||r[3],
    field: NF[r[4]]||r[4],
    name:r[5], award:r[6]
  })), []);

  const filtered = useMemo(() => data.filter(d => level==="All"||d.level===level), [data,level]);

  const totals = useMemo(()=>{
    const t={Gold:0,Silver:0,Bronze:0,HM:0};
    filtered.forEach(d=>{ if(t[d.award]!==undefined) t[d.award]++; });
    return t;
  },[filtered]);

  const bySchool = useMemo(()=>{
    const m={};
    filtered.forEach(d=>{
      if(!m[d.inst]) m[d.inst]={Gold:0,Silver:0,Bronze:0,HM:0,total:0,score:0};
      m[d.inst][d.award]=(m[d.inst][d.award]||0)+1;
      m[d.inst].total++; m[d.inst].score+=MW[d.award]||0;
    });
    return Object.entries(m).sort((a,b)=>b[1].score-a[1].score);
  },[filtered]);

  const byYear = useMemo(()=>{
    const m={};
    filtered.forEach(d=>{
      if(!m[d.year]) m[d.year]={Gold:0,Silver:0,Bronze:0,HM:0};
      m[d.year][d.award]=(m[d.year][d.award]||0)+1;
    });
    return Object.entries(m).sort((a,b)=>a[0]-b[0]);
  },[filtered]);

  const byField = useMemo(()=>{
    const m={};
    filtered.forEach(d=>{ m[d.field]=(m[d.field]||0)+1; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[filtered]);

  const champions = useMemo(()=>{
    const m={};
    filtered.forEach(d=>{
      if(!m[d.name]) m[d.name]={medals:[],insts:new Set()};
      m[d.name].medals.push(d); m[d.name].insts.add(d.inst);
    });
    return Object.entries(m).filter(([,v])=>v.medals.length>=2)
      .sort((a,b)=>{
        const sa=a[1].medals.reduce((s,x)=>s+(MW[x.award]||0),0);
        const sb=b[1].medals.reduce((s,x)=>s+(MW[x.award]||0),0);
        return sb-sa;
      });
  },[filtered]);

  const maxBar=bySchool.length>0?bySchool[0][1].score:1;
  const maxY=byYear.length>0?Math.max(...byYear.map(([,v])=>v.Gold+v.Silver+v.Bronze+v.HM)):1;
  const card={background:"#FFFFFF",border:"1px solid #E2E8F0",borderRadius:12,padding:20,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"};
  const pill=(active,onClick,label)=>(
    <button onClick={onClick} style={{padding:"7px 18px",borderRadius:24,border:`1.5px solid ${active?"#1D4ED8":"#CBD5E1"}`,background:active?"#1D4ED8":"white",color:active?"white":"#475569",cursor:"pointer",fontSize:13,fontWeight:active?"600":"400",transition:"all 0.15s"}}>{label}</button>
  );

  return (
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#F8FAFC",minHeight:"100vh",color:"#1E293B"}}>
      <div style={{background:"white",borderBottom:"1px solid #E2E8F0",padding:"24px 36px 0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:20}}>
          <div>
            <div style={{fontSize:11,letterSpacing:"0.2em",color:"#3B82F6",textTransform:"uppercase",fontWeight:600,marginBottom:6}}>Eduversal Partner Schools</div>
            <h1 style={{fontSize:26,fontWeight:700,color:"#0F172A",margin:0}}>🏆 Academic Olympiad Excellence</h1>
            <p style={{color:"#94A3B8",fontSize:13,margin:"5px 0 0"}}>525 medals · National & International · 2013–2025</p>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {["All","International","National"].map(l=>pill(level===l,()=>setLevel(l),l==="All"?"🌐 All":l==="International"?"🌍 International":"🇮🇩 National"))}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:0}}>
          {[
            {label:"Total",value:filtered.length,color:"#3B82F6",bg:"#EFF6FF",icon:"🎖️"},
            {label:"Gold",value:totals.Gold,color:"#D97706",bg:"#FFFBEB",icon:"🥇"},
            {label:"Silver",value:totals.Silver,color:"#475569",bg:"#F8FAFC",icon:"🥈"},
            {label:"Bronze + HM",value:totals.Bronze+totals.HM,color:"#92400E",bg:"#FEF3C7",icon:"🥉"},
          ].map(k=>(
            <div key={k.label} style={{background:k.bg,borderTop:`3px solid ${k.color}`,borderRadius:"0 0 8px 8px",padding:"14px 16px",textAlign:"center"}}>
              <div style={{fontSize:22}}>{k.icon}</div>
              <div style={{fontSize:26,fontWeight:700,color:k.color}}>{k.value}</div>
              <div style={{fontSize:11,color:"#64748B",fontWeight:500,marginTop:2}}>{k.label}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:0,marginTop:16}}>
          {[["overview","📊 Overview"],["schools","🏫 Schools"],["timeline","📅 Timeline"],["champions","⭐ Champions"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"10px 20px",border:"none",borderBottom:`2.5px solid ${tab===id?"#1D4ED8":"transparent"}`,background:"transparent",color:tab===id?"#1D4ED8":"#64748B",cursor:"pointer",fontSize:13,fontWeight:tab===id?600:400,transition:"all 0.15s"}}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"24px 36px"}}>
        {tab==="overview" && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div style={card}>
              <div style={{fontSize:12,fontWeight:600,color:"#94A3B8",letterSpacing:"0.08em",marginBottom:16}}>MEDAL DISTRIBUTION</div>
              {["Gold","Silver","Bronze","HM"].map(m=>(
                <div key={m} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                    <span style={{fontSize:13,fontWeight:500}}>{ME[m]} {m==="HM"?"Honorable Mention":m}</span>
                    <span style={{fontWeight:700,color:MC[m]}}>{totals[m]}</span>
                  </div>
                  <div style={{height:7,background:"#F1F5F9",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${(totals[m]/(filtered.length||1))*100}%`,background:MC[m],borderRadius:4}}/>
                  </div>
                </div>
              ))}
              <div style={{marginTop:16,paddingTop:14,borderTop:"1px solid #F1F5F9",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div style={{background:"#FEF9C3",borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:700,color:"#B45309"}}>{bySchool.length}</div>
                  <div style={{fontSize:11,color:"#92400E"}}>Active Schools</div>
                </div>
                <div style={{background:"#EFF6FF",borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:700,color:"#1D4ED8"}}>{[...new Set(filtered.map(d=>d.year))].length}</div>
                  <div style={{fontSize:11,color:"#1E40AF"}}>Years of Data</div>
                </div>
              </div>
            </div>
            <div style={card}>
              <div style={{fontSize:12,fontWeight:600,color:"#94A3B8",letterSpacing:"0.08em",marginBottom:16}}>TOP SUBJECTS</div>
              {byField.slice(0,9).map(([f,cnt],i)=>(
                <div key={f} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <div style={{width:18,fontSize:11,color:"#94A3B8",textAlign:"right",flexShrink:0}}>{i+1}</div>
                  <div style={{flex:1,fontSize:13}}>{f}</div>
                  <div style={{width:100,height:6,background:"#F1F5F9",borderRadius:3}}>
                    <div style={{height:"100%",width:`${(cnt/byField[0][1])*100}%`,background:`hsl(${220-i*18},70%,55%)`,borderRadius:3}}/>
                  </div>
                  <div style={{width:28,textAlign:"right",fontSize:13,fontWeight:600,color:"#475569"}}>{cnt}</div>
                </div>
              ))}
            </div>
            <div style={{...card,gridColumn:"1 / -1"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#94A3B8",letterSpacing:"0.08em",marginBottom:16}}>MEDALS BY YEAR</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:5,height:220}}>
                {byYear.map(([year,v])=>{
                  const total=v.Gold+v.Silver+v.Bronze+v.HM;
                  const h=(total/maxY)*200;
                  return (
                    <div key={year} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                      <div style={{fontSize:10,color:"#94A3B8",fontWeight:600}}>{total}</div>
                      <div style={{width:"100%",height:h,display:"flex",flexDirection:"column",justifyContent:"flex-end",borderRadius:"4px 4px 0 0",overflow:"hidden"}}>
                        {[["HM",v.HM],["Bronze",v.Bronze],["Silver",v.Silver],["Gold",v.Gold]].map(([m,cnt])=>cnt>0&&(
                          <div key={m} style={{width:"100%",flex:cnt,background:MC[m],minHeight:2}}/>
                        ))}
                      </div>
                      <div style={{fontSize:9,color:"#94A3B8",transform:"rotate(-45deg)",transformOrigin:"top center",marginTop:4,whiteSpace:"nowrap"}}>{year}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:16,marginTop:16,justifyContent:"center"}}>
                {["Gold","Silver","Bronze","HM"].map(m=>(
                  <div key={m} style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:10,height:10,borderRadius:2,background:MC[m]}}/>
                    <span style={{fontSize:11,color:"#64748B"}}>{m}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab==="schools" && (
          <div>
            <p style={{fontSize:13,color:"#94A3B8",marginBottom:16}}>Ranked by weighted score (Gold×4, Silver×3, Bronze×2, HM×1)</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {bySchool.map(([school,st],i)=>{
                const color=SC[school]||"#475569";
                const badge=i===0?"#F59E0B":i===1?"#94A3B8":i===2?"#B45309":null;
                return (
                  <div key={school} style={{...card,padding:"14px 18px",borderLeft:`4px solid ${color}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                      <div style={{width:30,height:30,borderRadius:"50%",background:badge||"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:badge?"white":"#64748B",flexShrink:0}}>{i+1}</div>
                      <div style={{flex:1,minWidth:120}}>
                        <div style={{fontWeight:600,fontSize:15,color:"#0F172A"}}>{school}</div>
                        <div style={{fontSize:12,color:"#94A3B8",marginTop:1}}>{st.total} medals · Score: <b style={{color}}>{st.score}</b></div>
                      </div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {["Gold","Silver","Bronze","HM"].map(m=>st[m]>0&&(
                          <span key={m} style={{padding:"3px 9px",borderRadius:20,background:`${MC[m]}18`,color:MC[m],fontSize:12,fontWeight:600,border:`1px solid ${MC[m]}35`}}>{ME[m]} {st[m]}</span>
                        ))}
                      </div>
                      <div style={{width:120}}>
                        <div style={{height:6,background:"#F1F5F9",borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${(st.score/maxBar)*100}%`,background:color,borderRadius:3}}/>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="timeline" && (
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[...filtered].sort((a,b)=>b.year-a.year).slice(0,60).map((d,i)=>(
              <div key={i} style={{...card,padding:"10px 14px",borderLeft:`3px solid ${MC[d.award]}`,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                <div style={{fontSize:20,width:28,textAlign:"center"}}>{ME[d.award]}</div>
                <div style={{flex:1,minWidth:120}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#0F172A"}}>{d.name}</div>
                  <div style={{fontSize:11,color:"#94A3B8"}}>{d.inst}</div>
                </div>
                <div style={{fontSize:12,color:"#475569",textAlign:"center"}}>
                  <div style={{fontWeight:500}}>{d.comp}</div>
                  <div style={{color:"#94A3B8"}}>{d.field}</div>
                </div>
                <span style={{padding:"3px 10px",borderRadius:20,background:"#F1F5F9",fontSize:11,color:"#3B82F6",fontWeight:600}}>{d.year}</span>
                <span style={{fontSize:11,color:"#94A3B8"}}>{d.level==="International"?"🌍":"🇮🇩"}</span>
              </div>
            ))}
            {filtered.length>60&&<div style={{textAlign:"center",color:"#94A3B8",fontSize:12,padding:8}}>Showing 60 of {filtered.length} records</div>}
          </div>
        )}

        {tab==="champions" && (
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <p style={{fontSize:13,color:"#94A3B8",margin:"0 0 4px"}}>Students with 2+ medals across any competition</p>
            {champions.map(([name,v],i)=>{
              const score=v.medals.reduce((s,m)=>s+(MW[m.award]||0),0);
              const hasGold=v.medals.some(m=>m.award==="Gold");
              return (
                <div key={name} style={{...card,borderLeft:`4px solid ${hasGold?MC.Gold:"#CBD5E1"}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                    <div style={{fontSize:26}}>{hasGold?"⭐":"🌟"}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15,color:"#0F172A"}}>{name}</div>
                      <div style={{fontSize:12,color:"#94A3B8"}}>{[...v.insts].join(" · ")}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:16,fontWeight:700,color:"#1D4ED8"}}>{v.medals.length} medals</div>
                      <div style={{fontSize:11,color:"#94A3B8"}}>Score: {score}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                    {v.medals.map((m,j)=>(
                      <span key={j} style={{padding:"3px 9px",borderRadius:20,background:`${MC[m.award]}15`,color:MC[m.award],fontSize:11,border:`1px solid ${MC[m.award]}30`,fontWeight:500}}>
                        {ME[m.award]} {m.year} {m.comp} {m.level==="International"?"🌍":"🇮🇩"}
                      </span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
